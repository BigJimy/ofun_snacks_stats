<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur — Rapport hebdomadaire Snacks O'Fun Park</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  /* === Couleurs de marque === */
  --brand-red:        #7b170f;
  --brand-red-light:  #cca09c;
  --brand-gold:       #c98a40;

  /* === Couleurs des 4 points de vente === */
  --pdv-explorer:     #7b170f;
  --pdv-rush:         #c98a40;
  --pdv-bar:          #1d9e75;
  --pdv-silver:       #4a6d8c;

  /* === Couleurs sémantiques === */
  --green-bg:  #eaf3de;
  --green-fg:  #3b6d11;
  --green-bar: #639922;
  --red-bg:    #fcebeb;
  --red-fg:    #791f1f;
  --red-bar:   #e24b4a;
  --amber-bg:  #faeeda;

  /* === Neutres === */
  --text-primary:   #1a1a1a;
  --text-secondary: #5f5e5a;
  --text-tertiary:  #888780;
  --bg-page:        #f5f4ef;
  --bg-card:        #ffffff;
  --bg-soft:        #f0eee6;
  --border:         #d3d1c7;
  --border-light:   #e6e4dd;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  color: var(--text-primary);
  background: var(--bg-page);
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* ============================================ */
/*  UI Shell (cachée à l'impression)           */
/* ============================================ */
.ui-shell {
  max-width: 720px;
  margin: 1.5rem auto;
  padding: 1.5rem;
  background: white;
  border-radius: 12px;
  border: 0.5px solid var(--border);
}
.ui-shell-header {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border-light);
}
.ui-logo {
  background: var(--brand-red);
  padding: 14px 18px;
  border-radius: 4px;
  height: 64px; min-width: 95px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ui-logo svg { height: 36px; width: auto; display: block; }
.ui-shell-title {
  font-size: 18px; font-weight: 500;
}
.ui-shell-subtitle {
  font-size: 12px; color: var(--text-secondary);
  margin-top: 2px;
}

.file-drop {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.file-drop:hover, .file-drop.dragover {
  border-color: var(--brand-red);
  background: var(--bg-soft);
}
.file-drop-text {
  font-size: 13px; color: var(--text-secondary);
}
.file-drop-text strong { color: var(--brand-red); }
.file-drop-name {
  font-size: 12px; color: var(--text-primary);
  margin-top: 6px;
  font-weight: 500;
}

.ui-controls {
  display: flex; gap: 0.75rem; align-items: center;
  margin-top: 1rem;
  flex-wrap: wrap;
}
.ui-controls label {
  font-size: 12px; color: var(--text-secondary);
}
.ui-controls select {
  padding: 8px 12px;
  border-radius: 6px;
  border: 0.5px solid var(--border);
  background: white;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}
.ui-controls select:disabled {
  opacity: 0.5; cursor: not-allowed;
}

button.primary, button.secondary {
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  font-family: inherit;
}
button.primary {
  background: var(--brand-red); color: white; border: none;
}
button.primary:hover:not(:disabled) { background: #5e110b; }
button.primary:disabled { background: #b4b2a9; cursor: not-allowed; }
button.secondary {
  background: white;
  color: var(--text-primary);
  border: 0.5px solid var(--border);
}
button.secondary:hover { background: var(--bg-soft); }

.log-zone {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  background: var(--bg-page);
  border-radius: 6px;
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: pre-wrap;
}
.log-zone.empty { display: none; }
.log-zone.error { background: var(--red-bg); color: var(--red-fg); }
.log-zone.success { background: var(--green-bg); color: var(--green-fg); }

/* Toolbar flottante d'impression */
.report-toolbar {
  position: fixed;
  bottom: 20px; right: 20px;
  display: flex; gap: 0.5rem;
  z-index: 100;
}

/* ============================================ */
/*  Feuille A4                                  */
/* ============================================ */
@page { size: A4 portrait; margin: 12mm 14mm; }

@media screen {
  .page-sheet {
    width: 210mm;
    min-height: 297mm;
    background: white;
    padding: 12mm 14mm;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    margin: 1rem auto;
    display: flex; flex-direction: column;
  }
}

@media print {
  html, body { background: white !important; padding: 0; margin: 0; }
  .ui-shell, .report-toolbar { display: none !important; }
  .page-sheet {
    width: auto !important;
    min-height: auto !important;
    padding: 0 !important;
    margin: 0 !important;
    box-shadow: none !important;
    page-break-after: always;
    display: flex; flex-direction: column;
  }
  .page-sheet:last-child { page-break-after: auto; }
}

.report-container { display: none; }
.report-container.ready { display: block; }
.page-content { flex: 1; }

/* === Header de page === */
.r-header {
  display: flex; justify-content: space-between; align-items: center;
  gap: 1rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.85rem;
  border-bottom: 2px solid var(--brand-red);
}
.r-header-left { display: flex; align-items: center; gap: 1rem; }
.r-logo {
  background: var(--brand-red);
  padding: 12px 16px;
  border-radius: 4px;
  height: 56px; min-width: 85px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.r-logo svg { height: 32px; width: auto; display: block; }
.r-overtitle {
  font-size: 10px; color: var(--text-secondary);
  letter-spacing: 0.15em;
  margin-bottom: 4px;
}
.r-title { font-size: 22px; font-weight: 500; line-height: 1.1; }
.r-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.r-header-right {
  font-size: 10px; color: var(--text-secondary);
  text-align: right;
}

.r-section-label {
  font-size: 11px; color: var(--text-secondary);
  letter-spacing: 0.1em;
  margin-bottom: 0.5rem;
}

.r-block {
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  background: white;
}
.r-block-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.r-block-grid .r-block { margin-bottom: 0; }

.perf-label {
  font-size: 11px; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.big-number {
  font-size: 36px; font-weight: 500; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.big-number.mid { font-size: 26px; }
.badge {
  display: inline-block;
  font-size: 12px;
  padding: 3px 9px;
  border-radius: 8px;
  vertical-align: middle;
}
.badge.up { background: var(--green-bg); color: var(--green-fg); }
.badge.down { background: var(--red-bg); color: var(--red-fg); }
.badge.neutral { background: var(--bg-soft); color: var(--text-secondary); }
.perf-meta {
  font-size: 11px; color: var(--text-secondary);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.perf-row {
  display: grid;
  grid-template-columns: 1fr 240px;
  gap: 1.5rem;
  align-items: center;
}

/* KPI */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.kpi-card {
  background: var(--bg-soft);
  padding: 0.75rem;
  border-radius: 8px;
}
.kpi-label {
  font-size: 10px; color: var(--text-secondary);
  margin-bottom: 2px;
}
.kpi-value {
  font-size: 18px; font-weight: 500; line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.kpi-foot {
  font-size: 10px; margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.kpi-foot.up { color: var(--green-fg); }
.kpi-foot.down { color: var(--red-fg); }
.kpi-foot.neutral { color: var(--text-secondary); }

/* Répartition */
.repart-row { margin-bottom: 14px; }
.repart-row:last-child { margin-bottom: 0; }
.repart-head {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px; margin-bottom: 4px;
}
.repart-head .swatch {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 2px; vertical-align: middle;
  margin-right: 6px;
}
.repart-head .nums { font-variant-numeric: tabular-nums; }
.repart-head .nums b { font-weight: 500; }
.repart-bar-bg {
  height: 12px;
  background: var(--bg-soft);
  border-radius: 3px;
  overflow: hidden;
}
.repart-bar-fill { height: 100%; }
.repart-foot {
  font-size: 10px; color: var(--text-secondary);
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.repart-foot .down { color: var(--red-fg); }
.repart-foot .up { color: var(--green-fg); }

.block-title {
  font-size: 11px; color: var(--text-secondary);
  letter-spacing: 0.05em; text-transform: uppercase;
  margin-bottom: 0.75rem;
}

/* Tableau */
.day-table {
  width: 100%; border-collapse: collapse;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}
.day-table th {
  text-align: right;
  padding: 6px 4px;
  color: var(--text-secondary); font-weight: 500;
  border-bottom: 0.5px solid #b4b2a9;
}
.day-table th:first-child, .day-table th.left-col { text-align: left; }
.day-table th.evo-col { text-align: left; width: 22%; }
.day-table td {
  text-align: right;
  padding: 6px 4px;
  border-bottom: 0.5px solid var(--border);
}
.day-table td:first-child { text-align: left; }
.day-table tr.peak { background: var(--amber-bg); }
.day-table tr.peak td { font-weight: 500; }
.day-table tr.peak .evo-bar-bg { background: white; }
.day-table tr.closed td { color: var(--text-tertiary); }
.day-table tr.total td {
  border-top: 1px solid var(--brand-red);
  border-bottom: none;
  padding: 7px 4px;
  font-weight: 500;
}
.evo-bar-cell { padding: 6px 4px; vertical-align: middle; }
.evo-bar-bg {
  height: 6px; background: var(--bg-soft);
  border-radius: 3px; position: relative;
}
.evo-bar-fill {
  position: absolute; height: 100%;
  border-radius: 3px; top: 0;
}
.evo-bar-fill.up { background: var(--green-bar); left: 50%; }
.evo-bar-fill.down { background: var(--red-bar); right: 50%; }
.col-up { color: var(--green-fg); }
.col-down { color: var(--red-fg); }

.legend {
  margin-top: 0.75rem;
  font-size: 10px;
  color: var(--text-secondary);
  display: flex; gap: 1rem; flex-wrap: wrap;
}
.legend .sw {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 2px; vertical-align: middle; margin-right: 4px;
}

.footer-page {
  margin-top: auto;
  padding-top: 1rem;
  font-size: 10px;
  color: var(--text-tertiary);
  border-top: 0.5px solid var(--border-light);
  display: flex; justify-content: space-between;
}
</style>
</head>

// ============================================
//  HELPERS
// ============================================
function normalizeRange(sheet) {
  if (sheet && sheet['!ref']) {
    const dec = XLSX.utils.decode_range(sheet['!ref']);
    dec.s.c = 0; dec.s.r = 0;
    sheet['!ref'] = XLSX.utils.encode_range(dec);
  }
}

const toNumber = (v) => {
  if (v === null || v === undefined || v === '' || v === '#DIV/0!') return null;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(',', '.'));
  return Number.isNaN(n) ? null : n;
};

const findIdx = (aoa, label, fromIdx = 0, toIdx = Infinity) => {
  for (let i = fromIdx; i < Math.min(aoa.length, toIdx); i++) {
    if ((aoa[i] || [])[1] === label) return i;
  }
  return -1;
};

function pct(num, denom) {
  if (denom === null || denom === undefined || denom === 0) return null;
  if (num === null || num === undefined) return null;
  return (num - denom) / denom * 100;
}
function part(num, total) {
  if (!total || total === 0) return null;
  if (num === null || num === undefined) return null;
  return num / total * 100;
}

const fmtMoney = (n, dec = 0) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n) + ' €';
};
const fmtMoneyK = (n) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  if (Math.abs(n) >= 1000) return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 1 }).format(n / 1000) + 'k';
  return Math.round(n).toString();
};
const fmtPct = (n, dec = 1) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  const sign = n > 0 ? '+' : '';
  return sign + new Intl.NumberFormat('fr-FR', { minimumFractionDigits: dec, maximumFractionDigits: dec }).format(n) + ' %';
};
const fmtNum = (n) => {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR').format(n);
};

// ============================================
//  PARSER
// ============================================
function parseWeekSheet(workbook, name) {
  const sheet = workbook.Sheets[name];
  if (!sheet) return null;
  normalizeRange(sheet);
  const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

  const idxSnacks = findIdx(aoa, 'SNACKS');
  const idxDistrib = findIdx(aoa, 'DISTRIBUTEURS', idxSnacks + 1);
  const idxTotalGlobal = findIdx(aoa, 'TOTAL HT', 0, idxSnacks);
  const idxTotalSnacks = findIdx(aoa, 'TOTAL HT', idxSnacks + 1, idxDistrib);
  const idxTotalDistrib = findIdx(aoa, 'TOTAL HT', idxDistrib + 1);

  const days7 = (row) => row ? row.slice(2, 9).map(toNumber) : [null,null,null,null,null,null,null];
  const days7N = (row) => row ? row.slice(12, 19).map(toNumber) : [null,null,null,null,null,null,null];

  const global_n1 = days7(aoa[idxTotalGlobal]);
  const global_n  = days7N(aoa[idxTotalGlobal]);
  const snacks_n1 = days7(aoa[idxTotalSnacks]);
  const snacks_n  = days7N(aoa[idxTotalSnacks]);
  const dist_n1   = days7(aoa[idxTotalDistrib]);
  const dist_n    = days7N(aoa[idxTotalDistrib]);

  const pdvSnacksLabels = ['EXPLORER CAMP', 'RUSH CANYON', 'BAR RUSH CANYON', 'SILVER LAKE'];
  const snacks_pdv = pdvSnacksLabels.map((lab) => {
    const idx = findIdx(aoa, lab, idxSnacks + 1, idxTotalSnacks);
    if (idx < 0) return { label: lab, n1: null, n: null };
    return {
      label: lab,
      n1: toNumber((aoa[idx] || [])[9]),
      n:  toNumber((aoa[idx] || [])[19])
    };
  });

  const pdvDistribLabels = ['EXPLORER CAMP', 'RUSH CANYON'];
  const dist_pdv = pdvDistribLabels.map((lab) => {
    const idx = findIdx(aoa, lab, idxDistrib + 1, idxTotalDistrib);
    if (idx < 0) return { label: lab, n1: null, n: null };
    return {
      label: lab,
      n1: toNumber((aoa[idx] || [])[9]),
      n:  toNumber((aoa[idx] || [])[19])
    };
  });

  const libelleN = (aoa[3] || [])[11];
  const libelleN1 = (aoa[3] || [])[1];

  const sumNum = (arr) => arr.reduce((a, v) => a + (v || 0), 0);

  return {
    name, libelleN, libelleN1,
    global_n1, global_n,
    total_n1: sumNum(global_n1), total_n: sumNum(global_n),
    snacks_n1, snacks_n,
    snacks_total_n1: sumNum(snacks_n1), snacks_total_n: sumNum(snacks_n),
    dist_n1, dist_n,
    dist_total_n1: sumNum(dist_n1), dist_total_n: sumNum(dist_n),
    snacks_pdv, dist_pdv
  };
}

// ============================================
//  CALCULS DÉRIVÉS
// ============================================
function computeDerived(weekData, allWeeks, weekName) {
  const sorted = [...allWeeks].sort((a, b) => {
    const na = parseInt(a.name.replace(/\D/g, ''), 10);
    const nb = parseInt(b.name.replace(/\D/g, ''), 10);
    return na - nb;
  });

  // Trajectoire : on cumule jusqu'à la semaine sélectionnée INCLUSE, puis on s'arrête
  // (on ne montre pas les semaines futures, même si elles sont dans le fichier)
  let cumN1 = 0, cumN = 0;
  const trajectory = [];
  let cumN1Target = 0, cumNTarget = 0;
  let reached = false;
  for (const w of sorted) {
    cumN1 += w.total_n1 || 0;
    cumN  += w.total_n  || 0;
    trajectory.push({
      label: w.name, n: w.total_n, n1: w.total_n1,
      cumN, cumN1
    });
    if (w.name === weekName) {
      cumN1Target = cumN1;
      cumNTarget = cumN;
      reached = true;
      break;  // on arrête la courbe à la semaine sélectionnée
    }
  }
  // Sécurité : si la semaine n'a pas été trouvée (cas improbable), on prend le dernier point
  if (!reached && trajectory.length) {
    cumN1Target = trajectory[trajectory.length - 1].cumN1;
    cumNTarget  = trajectory[trajectory.length - 1].cumN;
  }

  // KPI : jour de pic, jours actifs, CA moyen / jour actif
  const dayNames = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const days_n = weekData.global_n;
  const days_n1 = weekData.global_n1;

  // Un jour est "actif" si CA > 0 (les jours fermés ont null ou 0)
  const isActive = (v) => v !== null && v !== undefined && v > 0;
  const isOpen   = (v) => v !== null && v !== undefined;  // jour ouvert même si 0 € (rare)

  const jours_actifs_n  = days_n.filter(isActive).length;
  const jours_actifs_n1 = days_n1.filter(isActive).length;

  let pic_idx = -1, pic_val = -1;
  days_n.forEach((v, i) => { if (v !== null && v > pic_val) { pic_val = v; pic_idx = i; } });

  const ca_moy_n  = jours_actifs_n  > 0 ? weekData.total_n  / jours_actifs_n  : null;
  const ca_moy_n1 = jours_actifs_n1 > 0 ? weekData.total_n1 / jours_actifs_n1 : null;

  // Détail jour par jour avec part snacks/distrib + flag "ouvert"
  const dayDetails = dayNames.map((d, i) => {
    const totalN = days_n[i];
    const totalN1 = days_n1[i];
    const snN = weekData.snacks_n[i];
    const diN = weekData.dist_n[i];
    // Jour fermé : à la fois N et N-1 sont null/0 -> on l'affiche en "—"
    const closed = !isOpen(totalN) && !isOpen(totalN1);
    return {
      name: d,
      n: totalN, n1: totalN1,
      snacks_n: snN, dist_n: diN,
      part_snacks: part(snN, totalN),
      part_dist: part(diN, totalN),
      evol: pct(totalN, totalN1),
      closed,
      is_peak: i === pic_idx && pic_val > 0
    };
  });

  return {
    trajectory,
    cumN1Target, cumNTarget,
    evol_total: pct(weekData.total_n, weekData.total_n1),
    evol_cum: pct(cumNTarget, cumN1Target),
    part_snacks_total: part(weekData.snacks_total_n, weekData.total_n),
    part_dist_total:   part(weekData.dist_total_n,   weekData.total_n),
    jours_actifs_n, jours_actifs_n1,
    pic_name: pic_idx >= 0 ? dayNames[pic_idx] : '—',
    pic_val,
    pic_evol: pic_idx >= 0 ? pct(days_n[pic_idx], days_n1[pic_idx]) : null,
    ca_moy_n, ca_moy_n1,
    dayDetails
  };
}

// ============================================

function renderCompareBars(valN1, valN) {
  const maxV = Math.max(valN1 || 0, valN || 0, 1);
  const h1 = (valN1 || 0) / maxV * 50;
  const h2 = (valN  || 0) / maxV * 50;
  return `<svg viewBox="0 0 240 90" style="width:100%;height:90px">
    <text x="120" y="10" font-size="9" fill="#888780" text-anchor="middle">Comparaison N-1 vs N</text>
    <rect x="40" y="${73 - h1}" width="60" height="${h1}" fill="#cca09c"/>
    <rect x="140" y="${73 - h2}" width="60" height="${h2}" fill="#7b170f"/>
    <text x="70" y="86" font-size="10" fill="#5f5e5a" text-anchor="middle">N-1</text>
    <text x="170" y="86" font-size="10" fill="#5f5e5a" text-anchor="middle">N</text>
    <text x="70" y="${68 - h1}" font-size="9" fill="#5f5e5a" text-anchor="middle">${fmtMoneyK(valN1)}</text>

  </svg>`;
}

// ============================================
//  SVG : Courbe de trajectoire cumulée
// ============================================
function renderTrajectorySVG(trajectory) {
  const W = 600, H = 140;
  const padLeft = 40, padRight = 20, padTop = 20, padBottom = 25;
  const innerW = W - padLeft - padRight, innerH = H - padTop - padBottom;
  if (!trajectory.length) return `<svg viewBox="0 0 ${W} ${H}"></svg>`;

  const allVals = [];
  trajectory.forEach(t => {
    if (t.cumN  !== null) allVals.push(t.cumN);
    if (t.cumN1 !== null) allVals.push(t.cumN1);
  });
  const maxV = Math.max(...allVals, 1) * 1.05;

  const n = trajectory.length;
  const xOf = (i) => padLeft + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
  const yOf = (v) => padTop + innerH - (v / maxV) * innerH;

  // Grille horizontale (3 lignes + axe)
  let gridLines = '';
  const yLabels = [0, maxV / 3, 2 * maxV / 3, maxV];
  yLabels.forEach((v, i) => {
    const y = yOf(v);
    const isAxis = i === 0;
    gridLines += `<line x1="${padLeft}" y1="${y}" x2="${W - padRight}" y2="${y}" stroke="${isAxis ? '#d3d1c7' : '#e6e4dd'}" stroke-width="0.5"/>`;
    gridLines += `<text x="${padLeft - 5}" y="${y + 3}" font-size="9" fill="#888780" text-anchor="end">${fmtMoneyK(v)}</text>`;
  });

  // Labels X (semaines)
  let xLabels = '';
  trajectory.forEach((t, i) => {
    xLabels += `<text x="${xOf(i)}" y="${H - 10}" font-size="9" fill="#5f5e5a" text-anchor="middle">${t.label}</text>`;
  });

  // Polylines N-1 et N
  const ptsN1 = trajectory.map((t, i) => `${xOf(i)},${yOf(t.cumN1 || 0)}`).join(' ');
  const ptsN  = trajectory.map((t, i) => `${xOf(i)},${yOf(t.cumN  || 0)}`).join(' ');
  let dotsN1 = '', dotsN = '';
  trajectory.forEach((t, i) => {
    dotsN1 += `<circle cx="${xOf(i)}" cy="${yOf(t.cumN1 || 0)}" r="2.5" fill="#cca09c"/>`;
    dotsN  += `<circle cx="${xOf(i)}" cy="${yOf(t.cumN  || 0)}" r="3"   fill="#7b170f"/>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
    ${gridLines}
    ${xLabels}
    <polyline points="${ptsN1}" fill="none" stroke="#cca09c" stroke-width="1.5"/>
    <polyline points="${ptsN}"  fill="none" stroke="#7b170f" stroke-width="2.2"/>
    ${dotsN1}
    ${dotsN}
    <rect x="${W - 170}" y="0" width="9" height="2" fill="#7b170f"/>
    <text x="${W - 157}" y="5" font-size="9" fill="#5f5e5a">N (cumul)</text>
    <rect x="${W - 95}" y="0" width="9" height="2" fill="#cca09c"/>
    <text x="${W - 82}" y="5" font-size="9" fill="#5f5e5a">N-1 (cumul)</text>
  </svg>`;
}

// ============================================

function badgeFor(p) {
  if (p === null || p === undefined || Number.isNaN(p)) return '<span class="badge neutral">—</span>';
  if (p > 0) return `<span class="badge up">▲ ${fmtPct(p)}</span>`;
  if (p < 0) return `<span class="badge down">▼ ${fmtPct(p)}</span>`;
  return '<span class="badge neutral">0,0 %</span>';
}

function parseSemDateRange(libelle) {
  // libelle = "SEMAINE 19 - DU 04/05 AU 10/05"
  if (!libelle) return '';
  const m = libelle.match(/DU\s+(\d{2}\/\d{2})\s+AU\s+(\d{2}\/\d{2})/i);
  if (!m) return libelle;
  // Reconstruire en "Du lundi DD au dimanche DD MM AAAA"
  // Pour rester simple : on garde "Du DD/MM au DD/MM 2026" (ou 2025 pour N-1)
  return `Du ${m[1]} au ${m[2]}`;
}

function semNum(name) {
  return parseInt(name.replace(/\D/g, ''), 10);
}

// PdV colors map
const PDV_COLORS = {
  'EXPLORER CAMP':    '#7b170f',
  'RUSH CANYON':      '#c98a40',
  'BAR RUSH CANYON':  '#1d9e75',
  'SILVER LAKE':      '#4a6d8c'
};

function pdvLabel(s) {
  // EXPLORER CAMP -> Explorer Camp (capitalize)
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function renderRepartRow(label, valN, valN1, totalN, totalN1, color, isNewInN) {
  const partN  = part(valN, totalN);
  const partN1 = part(valN1, totalN1);
  const evol   = pct(valN, valN1);
  const partN_val = partN || 0;
  const evolDisplay = evol === null ? '' : (evol >= 0 ? `<span class="up">▲ ${fmtPct(evol)}</span>` : `<span class="down">▼ ${fmtPct(evol)}</span>`);

  let footText;
  if (isNewInN) {
    footText = 'Nouveau (absent en N-1)';
  } else if (valN1 === null || valN1 === 0) {
    footText = 'Pas de référence N-1';
  } else {
    footText = `N-1 : ${fmtMoney(valN1)} · ${fmtPct(partN1)} · ${evolDisplay}`;
  }

  return `
    <div class="repart-row">
      <div class="repart-head">
        <div><span class="swatch" style="background:${color}"></span>${label}</div>
        <div class="nums"><b>${fmtMoney(valN, 2)}</b> · ${fmtPct(partN)}</div>
      </div>
      <div class="repart-bar-bg">
        <div class="repart-bar-fill" style="width:${partN_val}%;background:${color}"></div>
      </div>
      <div class="repart-foot">${footText}</div>
    </div>`;
}

function renderDayRow(d, maxAbsEvol) {
  if (d.closed) {
    return `
      <tr class="closed">
        <td>${d.name}</td>
        <td>—</td><td>—</td>
        <td class="evo-bar-cell"><div class="evo-bar-bg"></div></td>
        <td>—</td><td>—</td><td>—</td>
      </tr>`;
  }
  const evolCls = d.evol === null ? '' : (d.evol >= 0 ? 'up' : 'down');
  const colCls  = d.evol === null ? '' : (d.evol >= 0 ? 'col-up' : 'col-down');
  const barWidth = d.evol === null || maxAbsEvol === 0 ? 0 : Math.min(50, Math.abs(d.evol) / maxAbsEvol * 50);
  const peakCls = d.is_peak ? ' class="peak"' : '';

  return `
    <tr${peakCls}>
      <td>${d.name}</td>
      <td>${fmtMoney(d.n1, 2)}</td>
      <td>${fmtMoney(d.n, 2)}</td>
      <td class="evo-bar-cell">
        <div class="evo-bar-bg">
          ${d.evol !== null ? `<div class="evo-bar-fill ${evolCls}" style="width:${barWidth}%"></div>` : ''}
        </div>
      </td>
      <td class="${colCls}">${fmtPct(d.evol)}</td>
      <td>${fmtPct(d.part_snacks)}</td>
      <td>${fmtPct(d.part_dist)}</td>
    </tr>`;
}

function renderPage2(week, d) {
  // Filtrer les PdV inactifs (à la fois N=0 et N-1=0 -> on les masque)
  const activeSnackPdv = week.snacks_pdv.filter(p => (p.n || 0) > 0 || (p.n1 || 0) > 0);
  const activeDistPdv  = week.dist_pdv.filter(p => (p.n || 0) > 0 || (p.n1 || 0) > 0);

  // Snacks vs Distributeurs : 2 lignes
  const canalRows =
    renderRepartRow('Snacks (vente directe)', week.snacks_total_n, week.snacks_total_n1, week.total_n, week.total_n1, '#7b170f', false) +
    renderRepartRow('Distributeurs', week.dist_total_n, week.dist_total_n1, week.total_n, week.total_n1, '#c98a40', false);

  // 4 PdV Snacks (filtrés)
  const pdvRows = activeSnackPdv.map(p => {
    const isNew = (p.n || 0) > 0 && (!p.n1 || p.n1 === 0);
    return renderRepartRow(
      pdvLabel(p.label),
      p.n, p.n1,
      week.snacks_total_n, week.snacks_total_n1,
      PDV_COLORS[p.label] || '#5f5e5a',
      isNew
    );
  }).join('');

  // Tableau jour par jour
  const maxAbsEvol = Math.min(100, Math.max(10, ...d.dayDetails.filter(x => x.evol !== null).map(x => Math.abs(x.evol))));
  const dayRows = d.dayDetails.map(dd => renderDayRow(dd, maxAbsEvol)).join('');

  // Ligne total
  const totalEvolCls = d.evol_total === null ? '' : (d.evol_total >= 0 ? 'up' : 'down');
  const totalColCls  = d.evol_total === null ? '' : (d.evol_total >= 0 ? 'col-up' : 'col-down');
  const totalBarW    = d.evol_total === null || maxAbsEvol === 0 ? 0 : Math.min(50, Math.abs(d.evol_total) / maxAbsEvol * 50);

  return `
    <div class="page-content">
      ${renderHeader(week, 2)}

      <!-- Section 4 : Répartition -->
      <div class="r-section-label">4 — RÉPARTITION DU CHIFFRE D'AFFAIRES</div>
      <div class="r-block-grid">
        <div class="r-block">
          <div class="block-title">Par canal de vente</div>
          ${canalRows}
        </div>
        <div class="r-block">
          <div class="block-title">Par point de vente (canal Snacks)</div>
          ${pdvRows || '<div style="font-size:11px;color:var(--text-secondary)">Aucun point de vente actif sur cette semaine.</div>'}
        </div>
      </div>

      <!-- Section 5 : Détail jour par jour -->
      <div class="r-section-label">5 — DÉTAIL JOUR PAR JOUR</div>
      <div class="r-block">
        <table class="day-table">
          <thead>
            <tr>
              <th class="left-col">Jour</th>
              <th>CA N-1</th>
              <th>CA N</th>
              <th class="evo-col">Évolution</th>
              <th>%</th>
              <th>Part Snacks</th>
              <th>Part Distrib.</th>
            </tr>
          </thead>
          <tbody>
            ${dayRows}
            <tr class="total">
              <td>Total</td>
              <td>${fmtMoney(week.total_n1, 2)}</td>
              <td>${fmtMoney(week.total_n, 2)}</td>
              <td class="evo-bar-cell">
                <div class="evo-bar-bg">
                  ${d.evol_total !== null ? `<div class="evo-bar-fill ${totalEvolCls}" style="width:${totalBarW}%"></div>` : ''}
                </div>
              </td>
              <td class="${totalColCls}">${fmtPct(d.evol_total)}</td>
              <td>${fmtPct(d.part_snacks_total)}</td>
              <td>${fmtPct(d.part_dist_total)}</td>
            </tr>
          </tbody>
        </table>

        <div class="legend">
          <span><span class="sw" style="background:var(--green-bar)"></span>évolution positive</span>
          <span><span class="sw" style="background:var(--red-bar)"></span>évolution négative</span>
          <span><span class="sw" style="background:var(--amber-bg);border:0.5px solid #d3b377"></span>pic d'activité</span>
          <span style="color:var(--text-tertiary)"><span class="sw" style="background:transparent;border:0.5px solid var(--border)"></span>jour fermé (—)</span>
        </div>
      </div>
    </div>
    ${renderFooter(week, 2)}`;
}


// ============================================
//  ÉTAT GLOBAL + UI
// ============================================
let currentWorkbook = null;
let currentAllWeeks = [];

const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const fileName   = document.getElementById('fileName');
const weekSelect = document.getElementById('weekSelect');
const btnPrint   = document.getElementById('btnPrint');
const btnReset   = document.getElementById('btnReset');
const logZone    = document.getElementById('logZone');
const reportContainer = document.getElementById('reportContainer');

function log(msg, type = '') {
  logZone.className = 'log-zone' + (type ? ' ' + type : '');
  logZone.textContent = msg;
}
function clearLog() {
  logZone.className = 'log-zone empty';
  logZone.textContent = '';
}

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
});
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0]; if (f) handleFile(f);
});
fileInput.addEventListener('change', (e) => {
  const f = e.target.files[0]; if (f) handleFile(f);
});

weekSelect.addEventListener('change', () => {
  if (!weekSelect.value) return;
  renderReport(weekSelect.value);
});

btnReset.addEventListener('click', () => {
  currentWorkbook = null;
  currentAllWeeks = [];
  fileName.textContent = '';
  fileInput.value = '';
  weekSelect.innerHTML = '<option value="">— Charger un fichier d\'abord —</option>';
  weekSelect.disabled = true;
  btnPrint.disabled = true;
  btnReset.disabled = true;
  reportContainer.classList.remove('ready');
  reportContainer.innerHTML = '<div class="page-sheet" id="page1"></div><div class="page-sheet" id="page2"></div>';
  clearLog();
});

function handleFile(file) {
  fileName.textContent = file.name;
  log('Lecture du fichier...');
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const weekSheets = wb.SheetNames.filter(n => /^S\d+$/.test(n));
      if (!weekSheets.length) {
        log('Aucun onglet semaine détecté (attendu : S14, S15, ...).', 'error');
        return;
      }
      const allWeeks = weekSheets.map(n => parseWeekSheet(wb, n)).filter(Boolean);
      currentWorkbook = wb;
      currentAllWeeks = allWeeks;

      // Sélecteur : on liste toutes les semaines, en sélectionnant par défaut
      // la dernière avec des données pour N (CA total > 0)
      const sorted = [...allWeeks].sort((a,b) => semNum(a.name) - semNum(b.name));
      weekSelect.innerHTML = sorted.map(w => {
        const hasData = (w.total_n || 0) > 0;
        return `<option value="${w.name}" ${hasData ? '' : 'data-empty="1"'}>${w.name} · ${w.libelleN || ''}${hasData ? '' : ' (sans données N)'}</option>`;
      }).join('');
      const defaultWeek = [...sorted].reverse().find(w => (w.total_n || 0) > 0);
      if (defaultWeek) weekSelect.value = defaultWeek.name;

      weekSelect.disabled = false;
      btnPrint.disabled = false;
      btnReset.disabled = false;

      log(`Fichier chargé. ${sorted.length} semaine(s) détectée(s) : ${sorted.map(w => w.name).join(', ')}.`, 'success');
      renderReport(weekSelect.value);
    } catch (err) {
      console.error(err);
      log('Erreur de lecture : ' + err.message, 'error');
    }
  };
  reader.onerror = () => log('Erreur de lecture du fichier.', 'error');
  reader.readAsArrayBuffer(file);
}

function renderReport(weekName) {
  const week = currentAllWeeks.find(w => w.name === weekName);
  if (!week) return;
  const derived = computeDerived(week, currentAllWeeks, weekName);
  document.getElementById('page1').innerHTML = renderPage1(week, derived);
  document.getElementById('page2').innerHTML = renderPage2(week, derived);
  reportContainer.classList.add('ready');
}
</script>
</body>
</html>
